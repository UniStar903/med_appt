<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Appointment Booking - Navbar</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        /** 
         * Styling for the Header Navbar
         */

        /* Main navigation bar */
        nav {
            padding: 1.5rem;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* Logo styling */
        .nav__logo {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0d213f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav__logo span {
            color: #3685fb;
        }

        /* Hamburger icon */
        .nav__icon {
            display: none;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Navigation links */
        .nav__links {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .link a {
            padding: 0.5rem 1rem;
            color: #0d213f;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link a:hover {
            color: #3685fb;
        }

        /* Buttons */
        .btn1 {
            border: 2px solid #3685fb;
            background-color: white;
            color: black;
            border-radius: 50px;
            padding: 6px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn1:hover {
            background-color: #3685fb;
            color: white;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .nav__icon {
                display: block;
            }

            .nav__links {
                display: none;
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
                background-color: #fff;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                padding: 1rem 0;
                border-radius: 0.5rem;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                animation: slideDown 0.4s ease-in-out;
            }

            .nav__links.active {
                display: flex;
            }
        }

        /* Slide down animation */
        @keyframes slideDown {
            0% {
                transform: translateY(-10px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <!-- Logo Section -->
        <div class="nav__logo">
            <a href="/">
                StayHealthy
                <!-- Doctor SVG Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" height="26" width="26" viewBox="0 0 1000 1000" style="fill:#3685fb">
                    <title>Doctor With Stethoscope</title>
                    <g>
                        <path d="M499.8,10c91.7,0,166,74.3,166,166c0,91.7-74.3,166-166,166c-91.7,0-166-74.3-166-166C333.8,84.3,408.1,10,499.8,10z"></path>
                        <path d="M499.8,522.8c71.2,0,129.1-58.7,129.1-129.1H370.6C370.6,464.1,428.6,522.8,499.8,522.8z"></path>
                        <path d="M693.2,395c-0.7,94.9-70.3,173.7-160.8,188.9v155.9c0,80.3-60.7,150.8-140.8,155.3c-83,4.7-152.7-58.9-157.6-139.7..."></path>
                    </g>
                </svg>
            </a>
            <span>.</span>
        </div>

        <!-- Hamburger Icon -->
        <div class="nav__icon" onClick="handleClick()">
            <i class="fa fa-bars"></i>
        </div>

        <!-- Navigation Links -->
        <ul class="nav__links active">
            <li class="link"><a href="../Landing_Page/LandingPage.html">Home</a></li>
            <li class="link"><a href="#">Appointments</a></li>
            <li class="link">
                <a href="../Sign_Up/Sign_Up.html"><button class="btn1">Sign Up</button></a>
            </li>
            <li class="link">
                <a href="../Login/Login.html"><button class="btn1">Login</button></a>
            </li>
        </ul>
    </nav>

    <!-- JavaScript for Toggle -->
    <script>
        function handleClick() {
            const navLinks = document.querySelector(".nav__links");
            const navIcon = document.querySelector(".nav__icon i");

            navLinks.classList.toggle("active");

            if (navLinks.classList.contains("active")) {
                navIcon.classList.remove("fa-times");
                navIcon.classList.add("fa-bars");
            } else {
                navIcon.classList.remove("fa-bars");
                navIcon.classList.add("fa-times");
            }
        }
    </script>
</body>
</html>
